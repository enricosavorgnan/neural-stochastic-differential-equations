# model : "./code/models/sir/"
checkpoint :  0

sde :
  name : sir
  system : SIRModel
  sde_type : "stratonovich"

  t_span : [0., 25.]
  dt : 0.1
  noise_type: "diagonal"
  noise_std : 0.1

  method : "euler_heun"
  adjoint : True
  levy_area : "space-time"

  x0_type : "constant"             # Default "random". Adapt if the model trained is used as a checkpoint for further training.
  x0_std : [1, 1]                  # Default 1. Adapt if the model trained is used as a checkpoint for further training.
  x0_mean : [0.99, 0.01]           # Default 0. Adapt if the model trained is used as a checkpoint for further training.


size :
  data_size : 2
  dataset_size : 5000
  batch_size : 64
  latent_size : 4
  context_size : 16
  hidden_size : 32


training :
  n_iters : 2000
  pause : 5
  device : cuda
  optimizer : adam

  lr_scheduler : exponential
  lr_init : 0.01                   # Default 0.01. Adapt if the model trained is used as a checkpoint for further training.
  lr_gamma : 0.997
  lr_step_size : 2

  kl_scheduler : linear
  kl_iters : 1000                  # Default 350. Adapt if the model trained is used as a checkpoint for further training.


save:
  model : True
  model_every : 5
  plot : True
  data : True
  n_samples : 5

path:
  data : "./code/data/sir/strato"
  model : "./code/models/sir/strato"
  plot : "./code/img/sir/"
