model : "./code/models/climate/sde_climate_time_06-10_19-43_iter_120-2000.pt"
checkpoint : 120

sde :
  name : climate
  system : ClimateModel
  sde_type : "stratonovich"

  t_span : [0., 100.]
  dt : 0.1
  noise_type: "diagonal"
  noise_std : 0.1

  method : "euler_heun"
  adjoint : True
  levy_area : "space-time"

  x0_type: "random"             # Default "random". Adapt if the model trained is used as a checkpoint for further training.
  x0_std: 1                  # Default 1. Adapt if the model trained is used as a checkpoint for further training.
  x0_mean: 0           # Default 0. Adapt if the model trained is used as a checkpoint for further training.


size :
  data_size : 1
  dataset_size : 5000
  batch_size : 8                # Default 1024
  latent_size : 4
  context_size : 16
  hidden_size : 32


training :
  n_iters : 2000
  pause : 5
  device : cpu
  optimizer : adam

  lr_scheduler : exponential
  lr_init : 0.01
  lr_gamma : 0.997
  lr_step_size : 1

  kl_scheduler : linear
  kl_iters : 1000


save:
  model : True
  model_every : 5
  plot : True
  data : True
  n_samples : 2

path:
  data : "./code/data/climate/"
  model : "./code/models/climate/"
  plot : "./code/img/climate/"


