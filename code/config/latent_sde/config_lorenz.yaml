model : "./code/models/lorenz/sde_lorenz_time_06-09_09-26_iter_500-500.pt"

sde :
  name : lorenz
  system : StochasticLorenz
  sde_type : ito

  t_span : [0., 3.]
  dt : 0.01
  noise_type: "diagonal"
  noise_std : 0.01

  method : 'euler'
  adjoint : True
  levy_area : 'space-time'


size :
  data_size : 3
  batch_size : 1024
  latent_size : 4
  context_size : 64
  hidden_size : 128


training :
  n_iters : 500
  pause : 2
  device : xpu
  optimizer : adam

  lr_scheduler : exponential
  lr_init : 0.001
  lr_gamma : 0.997
  lr_step_size : 2

  kl_scheduler : linear
  kl_iters : 350


save:
  model : True
  model_every : 2
  plot : True
  data : True
  n_samples : 2

path:
  data : "./code/data/lorenz/"
  model : "./code/models/lorenz/"
  plot : "./code/img/lorenz/"
