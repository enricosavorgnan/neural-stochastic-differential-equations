# Config file for the project
# Follows Li et al. (2020) "Scalable Gradients for Stochastic Differential Equations"

# Example 2: Ornstein-Uhlenbeck SDE

# dX = - p[0] * X dt + p[1] * dW

# Training parameters
sde:
  n_params : 2
  sde_type : 'stratonovich'
  params_sample_type : 'gaussian'
  noise_type : 'diagonal'
  t_span : [0, 15]
  t_size : 100

  drift : "-p[0] * x"
  diffusion : "p[1] * torch.ones_like(x) "

  fixed_params : [0.5, 0.1]

  method : "midpoint"
  fixed_noise : True
  seed : 42


training:
  device : "cpu"
  n_iters : 2
  loss : "nn.MSELoss()"
  optimizer : "adam"            # accepted are "adam", "sgd"
  lr : "step"                   # accepted are "constant", "step", "exponential"
  lr_params : {
    "step_size" : 1,
    "gamma" : 0.99
  }
  lr_value : 0.1

plot:
  plot : True
  save : True
  save_path : "./code/img/"
  skip_samples : 20
