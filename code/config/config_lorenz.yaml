sde :
  name : lorenz
  system : StochasticLorenz
  sde_type : ito

  t_span : [0., 3.]
  dt : 0.01
  noise_type: "diagonal"
  noise_std : 0.01

  method : 'euler'
  adjoint : True
  levy_area : 'space-time'


model :
  data_size : 3
  batch_size : 16
  latent_size : 4
  context_size : 64
  hidden_size : 128


training :
  n_iters : 20
  pause : 2
  device : cpu
  optimizer : adam

  lr_scheduler : exponential
  lr_init : 0.1
  lr_gamma : 0.95
  lr_step_size : 2

  kl_scheduler : linear
  kl_iters : 100


save:
  model : True
  model_every : 2
  plot : True
  data : True
  n_samples : 20
  plot_dim : 3

path:
  data : "./code/data/"
  model : "./code/models/"
  plot : "./code/img/"


